# Hooks run at the pre-commit stage by default; commitlint opts in to commit-msg
# below so the Go/whitespace hooks don't run a second time at commit-msg time.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: testdata
      - id: end-of-file-fixer
        exclude: testdata
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: golangci-lint
      - id: go-unit-tests
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        language_version: system
        additional_dependencies: ['@commitlint/config-conventional']
